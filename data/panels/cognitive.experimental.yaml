name: "Cognitive Resilience & Aging"
description: Focused exploratory panel for episodic memory, neuroplasticity, and cognitive-aging resilience
category: wellness
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
summary: >
  Exploratory cognitive panel narrowed to a few loci with at least some literature support
  for episodic memory, neuroplasticity, or cognitive-aging resilience. It avoids claims
  about intelligence, fixed talent, or neurodevelopmental architecture.
sources:
  - type: pubmed
    citation: "KIBRA rs17070145 and episodic memory / late-onset AD-related findings"
    url: "https://pubmed.ncbi.nlm.nih.gov/18789830/"
  - type: pubmed
    citation: "BDNF rs6265 and hippocampal-volume meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/24674929/"
  - type: pubmed
    citation: "Klotho heterozygosity and Alzheimer endophenotypes"
    url: "https://pubmed.ncbi.nlm.nih.gov/35617280/"
limitations:
  - These variants do not measure intelligence or predict educational outcome.
  - Cognitive performance depends strongly on sleep, stress, education, health, aging, and environment.
  - Several prior SNPs were removed because they were too speculative, duplicated better panels, or encouraged over-interpretation.

variants:
  - rsid: rs17070145
    gene: KIBRA
    trait: Episodic memory tendency
    evidence_level: low
    sources:
      - type: pubmed
        citation: "KIBRA rs17070145 and episodic memory / late-onset AD-related findings"
        url: "https://pubmed.ncbi.nlm.nih.gov/18789830/"
      - type: pubmed
        citation: "Impact of common KIBRA allele on human cognitive functions"
        url: "https://pubmed.ncbi.nlm.nih.gov/21346737/"
    genotypes:
      TT:
        effect: memory_favorable
        description: T/T has been linked in some cohorts to somewhat better episodic memory performance, but replication has been inconsistent.
      TC:
        effect: mildly_favorable
        description: One T allele. Directionally favorable in some episodic-memory studies, though effect sizes are small and not consistently reproduced.
      CC:
        effect: typical
        description: Typical KIBRA profile at this locus. This should not be read as a cognitive disadvantage by itself.
    aliases:
      CT: TC

  - rsid: rs6265
    gene: BDNF
    trait: Neuroplasticity support
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "BDNF rs6265 and hippocampal-volume meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/24674929/"
      - type: pubmed
        citation: "BDNF and COMT interaction on cortical plasticity"
        url: "https://pubmed.ncbi.nlm.nih.gov/22457502/"
    genotypes:
      CC:
        effect: typical
        description: Typical BDNF-related plasticity support at this locus.
      CT:
        effect: reduced_activity
        description: Reduced activity-dependent BDNF secretion. This may matter more for learning adaptation and recovery than for everyday intelligence.
      TT:
        effect: lower_activity
        description: Lower activity-dependent BDNF secretion. Best interpreted as a plasticity-related vulnerability rather than as a global cognitive deficit.
    aliases:
      GG: CC
      GA: CT
      AA: TT
      AG: CT

  - rsid: rs9536314
    gene: KL (Klotho)
    trait: Cognitive-aging resilience
    evidence_level: low
    sources:
      - type: pubmed
        citation: "Klotho heterozygosity and Alzheimer endophenotypes"
        url: "https://pubmed.ncbi.nlm.nih.gov/35617280/"
    genotypes:
      TT:
        effect: typical
        description: Typical Klotho profile at this locus.
      TG:
        effect: potentially_favorable
        description: Heterozygous Klotho profile. Some studies suggest a resilience signal for cognition or aging-related brain measures, but this remains context-dependent.
      GG:
        effect: unclear
        description: Homozygous variant profile. Klotho findings are mixed enough that this genotype should not be given a strong directional interpretation.
    aliases:
      GT: TG
