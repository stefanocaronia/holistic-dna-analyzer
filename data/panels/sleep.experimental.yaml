name: "Sleep & Circadian Rhythm"
description: Focused exploratory panel for chronotype and homeostatic sleep-pressure tendencies
category: wellness
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
summary: >
  Exploratory sleep panel narrowed to a few loci with at least some direct literature
  support for chronotype, circadian preference, or sleep homeostasis. It is useful for
  framing tendencies, but far too limited and context-dependent for diagnosis or for
  strong claims about insomnia, sleep need, or treatment response.
sources:
  - type: pubmed
    citation: "ADA rs73598374 affects sleep EEG spectral power"
    url: "https://pubmed.ncbi.nlm.nih.gov/22952909/"
  - type: pubmed
    citation: "ADA rs73598374, evening melatonin levels, and sleep quality"
    url: "https://pubmed.ncbi.nlm.nih.gov/33981350/"
  - type: pubmed
    citation: "MTNR1B rs4753426 and diurnal preference / sleep habits"
    url: "https://pubmed.ncbi.nlm.nih.gov/30508778/"
  - type: pubmed
    citation: "CLOCK gene variants and chronotype-related findings in EPIC"
    url: "https://pubmed.ncbi.nlm.nih.gov/35961261/"
limitations:
  - Sleep traits are highly polygenic and strongly shaped by light exposure, work schedule, stress, age, and behavior.
  - These variants describe tendencies, not fixed sleep outcomes or treatment recommendations.
  - Several rarer or more weakly supported sleep SNPs were intentionally removed from this repository panel.

variants:
  - rsid: rs73598374
    gene: ADA
    trait: Sleep homeostasis and sleep depth
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "ADA rs73598374 affects sleep EEG spectral power"
        url: "https://pubmed.ncbi.nlm.nih.gov/22952909/"
      - type: pubmed
        citation: "ADA rs73598374, evening melatonin levels, and sleep quality"
        url: "https://pubmed.ncbi.nlm.nih.gov/33981350/"
    genotypes:
      GG:
        effect: typical
        description: Typical ADA-related sleep homeostasis at this locus.
      GA:
        effect: deeper_sleep
        description: A-allele carrier. Associated in several studies with deeper or more intense sleep and higher sleep pressure, though findings are not uniform across every sleep outcome.
      AA:
        effect: deeper_sleep
        description: Rare two-allele carrier. Directionally associated with higher sleep pressure and deeper sleep physiology, but population data are limited.
    aliases:
      AG: GA
      CC: GG
      CT: GA
      TT: AA

  - rsid: rs1801260
    gene: CLOCK
    trait: Chronotype tendency
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "CLOCK gene variants and chronotype-related findings in EPIC"
        url: "https://pubmed.ncbi.nlm.nih.gov/35961261/"
    genotypes:
      TT:
        effect: morning_tendency
        description: More morning-oriented tendency in some cohorts, though effect size is modest.
      TC:
        effect: intermediate
        description: Intermediate chronotype tendency. Environment and routine likely matter more than genotype here.
      CC:
        effect: evening_tendency
        description: More evening-oriented tendency in some cohorts. This can make socially early schedules feel less natural, but the effect is not deterministic.
    aliases:
      CT: TC
      AA: CC
      AG: TC
      GG: TT

  - rsid: rs4753426
    gene: MTNR1B
    trait: Diurnal preference / circadian entrainment
    evidence_level: low
    sources:
      - type: pubmed
        citation: "MTNR1B rs4753426 and diurnal preference / sleep habits"
        url: "https://pubmed.ncbi.nlm.nih.gov/30508778/"
    genotypes:
      CC:
        effect: morning_tendency
        description: C/C was associated with a more morning-oriented profile in one cohort study.
      CT:
        effect: intermediate
        description: Mixed or intermediate tendency. This locus is plausible for circadian entrainment, but evidence remains limited.
      TT:
        effect: later_tendency
        description: T/T may lean away from morningness in some cohorts, but this is a weak signal and should be interpreted cautiously.
    aliases:
      TC: CT
