name: Cardiovascular Health
description: Genetic variants related to heart disease risk, cholesterol, and blood pressure
category: health

variants:
  - rsid: rs1801133
    gene: MTHFR
    trait: MTHFR C677T — folate metabolism
    genotypes:
      CC:
        effect: normal
        description: Normal MTHFR enzyme activity. Standard folate metabolism.
      CT:
        effect: reduced
        description: ~65% MTHFR activity. Mildly elevated homocysteine possible. Ensure adequate folate intake.
      TT:
        effect: significantly_reduced
        description: ~30% MTHFR activity. Higher homocysteine risk. Consider methylfolate supplementation.
    aliases:
      AG: CT
      AA: TT
      GG: CC

  - rsid: rs1801131
    gene: MTHFR
    trait: MTHFR A1298C — secondary folate variant
    genotypes:
      TT:
        effect: normal
        description: Normal A1298C. No additional MTHFR impact.
      TG:
        effect: mild
        description: Heterozygous A1298C. Mild reduction in MTHFR activity, especially if combined with C677T.
      GG:
        effect: reduced
        description: Homozygous A1298C. Reduced MTHFR activity. Check homocysteine levels.
    aliases:
      GT: TG

  - rsid: rs429358
    gene: APOE
    trait: APOE4 status (part 1 of 2 — combine with rs7412)
    genotypes:
      TT:
        effect: no_e4
        description: No APOE ε4 allele from this position.
      TC:
        effect: one_e4
        description: One APOE ε4 allele. Moderately increased cardiovascular and Alzheimer risk.
      CC:
        effect: two_e4
        description: APOE ε4/ε4 from this position. Significantly elevated risk. Combine with rs7412.

  - rsid: rs7412
    gene: APOE
    trait: APOE2 status (part 2 of 2 — combine with rs429358)
    genotypes:
      CC:
        effect: no_e2
        description: No APOE ε2 allele.
      CT:
        effect: one_e2
        description: One APOE ε2 allele. Generally protective for cardiovascular risk.
      TT:
        effect: two_e2
        description: APOE ε2/ε2. Protective, but rare risk of type III hyperlipoproteinemia.

  - rsid: rs1333049
    gene: 9p21 region
    trait: Coronary artery disease risk (9p21 locus)
    genotypes:
      GG:
        effect: lower_risk
        description: Lower genetic risk for coronary artery disease at this locus.
      GC:
        effect: moderate_risk
        description: Moderate genetic risk for coronary artery disease. One risk allele.
      CC:
        effect: higher_risk
        description: Higher genetic risk for coronary artery disease. Two risk alleles. Lifestyle factors important.

  - rsid: rs5186
    gene: AGTR1
    trait: Angiotensin II receptor — blood pressure
    genotypes:
      AA:
        effect: normal
        description: Normal angiotensin II receptor. Standard blood pressure regulation.
      AC:
        effect: increased_risk
        description: One risk allele. Slightly increased risk of hypertension.
      CC:
        effect: higher_risk
        description: Two risk alleles. Increased hypertension susceptibility. Monitor blood pressure.
