name: "Mental Health & Stress Response"
description: Focused exploratory panel for stress reactivity, neuroplasticity, and a few affect-related signaling pathways
category: health
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
review_outcome: experimental_only
review_notes: >
  Kept exploratory because user value is high but psychiatric interpretation risk remains too high for trusted-core
  inclusion.
summary: >
  Exploratory mental-health panel narrowed to a small set of variants with at least some
  functional or repeated literature support around neuroplasticity, catecholamine
  clearance, HPA-axis stress regulation, and serotonin signaling. It is meant for
  framing vulnerabilities and resilience patterns, not for diagnosing depression,
  anxiety, PTSD, or predicting treatment response on its own.
sources:
  - type: pubmed
    citation: "BDNF rs6265 meta-analysis found no clear association with major depression"
    url: "https://pubmed.ncbi.nlm.nih.gov/23184535/"
  - type: pubmed
    citation: "COMT Val158Met and adult cortisol response to psychological stress"
    url: "https://pubmed.ncbi.nlm.nih.gov/28452825/"
  - type: pubmed
    citation: "FKBP5 rs1360780 interaction with early-life stress in depression/PTSD meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/28850857/"
  - type: pubmed
    citation: "HTR1A rs6295 functional polymorphism and psychiatric outcomes"
    url: "https://pubmed.ncbi.nlm.nih.gov/26926882/"
limitations:
  - These variants do not diagnose depression, anxiety, PTSD, or treatment response.
  - Many effects are small and often depend on environment, trauma exposure, sex, ancestry, and other loci.
  - Several serotonin, oxytocin, and antidepressant-response SNPs were intentionally removed because the evidence was weaker or the previous wording was too strong.

variants:
  - rsid: rs6265
    gene: BDNF
    trait: Activity-dependent neuroplasticity
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "BDNF rs6265 meta-analysis found no clear association with major depression"
        url: "https://pubmed.ncbi.nlm.nih.gov/23184535/"
      - type: pubmed
        citation: "BDNF rs6265, job stress, and burnout"
        url: "https://pubmed.ncbi.nlm.nih.gov/34245319/"
    genotypes:
      CC:
        effect: typical
        description: Typical BDNF secretion profile at this locus. This does not imply immunity to mood problems, only that this specific neuroplasticity marker is not shifted in the lower-function direction.
      CT:
        effect: reduced_activity
        description: Reduced activity-dependent BDNF secretion. This may modestly affect stress adaptation or learning-related plasticity, but direct links to depression are inconsistent.
      TT:
        effect: lower_activity
        description: Lower activity-dependent BDNF secretion. This can be framed as a vulnerability in stress adaptation or plasticity rather than as a direct depression marker.
    aliases:
      GG: CC
      GA: CT
      AA: TT
      AG: CT

  - rsid: rs4680
    gene: COMT
    trait: Catecholamine clearance under stress
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "COMT Val158Met and adult cortisol response to psychological stress"
        url: "https://pubmed.ncbi.nlm.nih.gov/28452825/"
      - type: pubmed
        citation: "Physiological stress responsivity and COMT Val158Met"
        url: "https://pubmed.ncbi.nlm.nih.gov/30628551/"
    genotypes:
      GG:
        effect: faster_clearance
        description: Faster catecholamine clearance. This can be advantageous in some acute-stress contexts but may also come with less sustained prefrontal dopamine tone.
      GA:
        effect: intermediate
        description: Intermediate COMT activity. Often the most context-balanced profile, though stress effects still depend heavily on environment and other variants.
      AA:
        effect: slower_clearance
        description: Slower catecholamine clearance. In some studies this aligns with higher stress sensitivity or stronger emotional reactivity, but not in a deterministic way.
    aliases:
      AG: GA

  - rsid: rs1360780
    gene: FKBP5
    trait: HPA-axis stress sensitivity
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "FKBP5 rs1360780 interaction with early-life stress in depression/PTSD meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/28850857/"
      - type: pubmed
        citation: "FKBP5 systematic review / meta-analysis in depressive disorders"
        url: "https://pubmed.ncbi.nlm.nih.gov/30791339/"
    genotypes:
      CC:
        effect: typical
        description: Typical FKBP5-related stress feedback at this locus.
      CT:
        effect: stress_sensitive
        description: One T allele. This is most usefully interpreted as higher sensitivity to adverse stress exposure, especially early-life stress, not as a stand-alone diagnosis marker.
      TT:
        effect: higher_stress_sensitivity
        description: Two T alleles. This strengthens the possibility of greater vulnerability to prolonged stress effects, particularly in the presence of trauma or repeated adversity.

  - rsid: rs6295
    gene: HTR1A
    trait: Serotonin autoreceptor regulation
    evidence_level: low
    sources:
      - type: pubmed
        citation: "HTR1A rs6295 functional polymorphism and psychiatric outcomes"
        url: "https://pubmed.ncbi.nlm.nih.gov/26926882/"
      - type: pubmed
        citation: "HTR1A rs6295 and mechanisms of fear"
        url: "https://pubmed.ncbi.nlm.nih.gov/25514753/"
    genotypes:
      CC:
        effect: typical
        description: Typical HTR1A-related autoreceptor regulation at this locus.
      CG:
        effect: altered_regulation
        description: Altered serotonin autoreceptor regulation. This may matter more for threat sensitivity or anxious temperament than for broad depression risk.
      GG:
        effect: higher_threat_sensitivity
        description: G/G has been linked to altered 5-HT1A regulation and, in some studies, greater fear or stress-related vulnerability. Evidence is still mixed enough that this should stay exploratory.
