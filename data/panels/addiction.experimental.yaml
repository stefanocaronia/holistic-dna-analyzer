name: "Addiction & Substance Use"
description: Focused exploratory panel for nicotine dependence and alcohol-response biology
category: health
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
review_outcome: experimental_only
review_notes: >
  Kept exploratory because some nicotine and alcohol markers are plausible, but the domain remains vulnerable to
  overstatement and context omissions.
summary: >
  Exploratory addiction panel narrowed to a few loci with comparatively strong support for
  nicotine dependence or alcohol-response biology. It avoids broad personality claims and
  treats these variants as modifiers of substance response or exposure patterns, not as
  destiny or diagnosis.
sources:
  - type: pubmed
    citation: "CHRNA5 rs16969968 as a strong predictor of nicotine dependence"
    url: "https://pubmed.ncbi.nlm.nih.gov/26239294/"
  - type: pubmed
    citation: "rs1051730 as a regulatory signal for nicotine dependence and lung-cancer risk"
    url: "https://pubmed.ncbi.nlm.nih.gov/40755048/"
  - type: pubmed
    citation: "ADH1B rs1229984 and alcohol-consumption / alcohol-use outcomes"
    url: "https://pubmed.ncbi.nlm.nih.gov/24988262/"
  - type: pubmed
    citation: "ALDH2 rs671 and alcohol-related esophageal cancer risk meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/37795758/"
limitations:
  - These variants do not diagnose addiction or predict behavior on their own.
  - Environment, exposure, stress, trauma, culture, and access to substances matter more than any single locus.
  - Dopamine-, cannabinoid-, and opioid-related SNPs were intentionally removed because the previous panel over-interpreted weaker and less consistent evidence.

variants:
  - rsid: rs1051730
    gene: CHRNA3
    trait: Nicotine dependence susceptibility
    evidence_level: high
    sources:
      - type: pubmed
        citation: "rs1051730 as a regulatory signal for nicotine dependence and lung-cancer risk"
        url: "https://pubmed.ncbi.nlm.nih.gov/40755048/"
    genotypes:
      CC:
        effect: lower_risk
        description: Lower known nicotine-dependence signal at this locus.
      CT:
        effect: moderate_risk
        description: One risk allele. Associated with greater nicotine dependence and heavier smoking in multiple cohorts.
      TT:
        effect: higher_risk
        description: Two risk alleles. Stronger nicotine-dependence signal at this locus, especially in populations where this association has replicated well.
    aliases:
      GG: CC
      GA: CT
      AA: TT
      TC: CT

  - rsid: rs16969968
    gene: CHRNA5
    trait: Heavy-smoking susceptibility
    evidence_level: high
    sources:
      - type: pubmed
        citation: "CHRNA5 rs16969968 as a strong predictor of nicotine dependence"
        url: "https://pubmed.ncbi.nlm.nih.gov/26239294/"
    genotypes:
      GG:
        effect: lower_risk
        description: Lower heavy-smoking signal at this locus.
      GA:
        effect: moderate_risk
        description: One risk allele. Associated with a greater tendency toward heavier smoking or stronger nicotine dependence.
      AA:
        effect: higher_risk
        description: Two risk alleles. Stronger nicotine-dependence signal, though actual behavior still depends heavily on exposure and environment.
    aliases:
      AG: GA

  - rsid: rs1229984
    gene: ADH1B
    trait: Alcohol aversive-response / reduced drinking tendency
    evidence_level: high
    sources:
      - type: pubmed
        citation: "ADH1B rs1229984 and alcohol-consumption / alcohol-use outcomes"
        url: "https://pubmed.ncbi.nlm.nih.gov/24988262/"
      - type: pubmed
        citation: "Mendelian randomization using ADH1B rs1229984"
        url: "https://pubmed.ncbi.nlm.nih.gov/25011450/"
    genotypes:
      CC:
        effect: typical
        description: Typical alcohol-metabolism profile at this locus.
      CT:
        effect: protective
        description: One fast-metabolizing allele. Often associated with lower alcohol consumption and lower alcohol-use-disorder risk because alcohol can feel less pleasant.
      TT:
        effect: strongly_protective
        description: Two fast-metabolizing alleles. Stronger aversive alcohol-response tendency, though prevalence is low in many populations.
    aliases:
      TC: CT

  - rsid: rs671
    gene: ALDH2
    trait: Alcohol flush / acetaldehyde clearance
    evidence_level: high
    sources:
      - type: pubmed
        citation: "ALDH2 rs671 and alcohol-related esophageal cancer risk meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/37795758/"
      - type: pubmed
        citation: "ALDH2 variants leading to acetaldehyde accumulation after alcohol challenge"
        url: "https://pubmed.ncbi.nlm.nih.gov/39075523/"
    genotypes:
      GG:
        effect: typical
        description: Typical acetaldehyde clearance at this locus.
      GA:
        effect: reduced_clearance
        description: Reduced acetaldehyde clearance. Often causes flushing and can strongly change alcohol tolerance and cancer risk if drinking continues.
      AA:
        effect: severely_reduced_clearance
        description: Severely reduced acetaldehyde clearance. Strong alcohol flush/aversive response and substantially altered alcohol-related risk profile.
    aliases:
      AG: GA
