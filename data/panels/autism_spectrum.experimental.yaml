name: Autism-Related Common Variant Signals
description: Exploratory common-variant panel for autism-related association signals with cautious, non-diagnostic wording
category: health
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
review_outcome: experimental_only
review_notes: >
  Kept exploratory because common-variant autism signals are too weak and non-diagnostic for any trusted default use.
summary: >
  Minimal exploratory panel covering a few common variants that have appeared in
  autism association studies. These are not diagnostic, have small effect sizes,
  and should never be used to infer identity, impairment, or clinical autism on
  their own.
sources:
  - type: pubmed
    id: "30610940"
  - type: pubmed
    id: "27417655"
  - type: pubmed
    id: "19255034"
  - type: pubmed
    id: "19002214"
  - type: pubmed
    id: "21310003"
  - type: pubmed
    id: "30681286"
  - type: pubmed
    id: "26559825"
  - type: pubmed
    id: "34257739"
limitations:
  - Common variants explain only a tiny portion of autism heritability.
  - Associations across studies are often inconsistent across ancestry groups and cohorts.
  - This panel is suitable only for exploratory context, never for diagnosis or identity claims.

variants:
  - rsid: rs4307059
    gene: 5p14.1 (MSNP1AS / CDH9-CDH10 region)
    trait: Common autism-association locus
    evidence_level: low
    sources:
      - type: pubmed
        id: "30610940"
      - type: pubmed
        id: "27417655"
    genotypes:
      TT:
        effect: typical
        description: Typical genotype for this exploratory common-variant locus.
      CT:
        effect: associated_signal
        description: Common variant associated in some cohorts with a modest autism-related signal.
      CC:
        effect: stronger_associated_signal
        description: Common variant with a somewhat stronger association signal in some studies, still non-diagnostic.
    aliases:
      TC: CT

  - rsid: rs1858830
    gene: MET
    trait: MET regulatory signal / neurodevelopmental association
    evidence_level: low
    sources:
      - type: pubmed
        id: "19255034"
      - type: pubmed
        id: "19002214"
    genotypes:
      CC:
        effect: typical
        description: Typical genotype for this exploratory MET marker.
      CG:
        effect: associated_signal
        description: Common variant reported in some autism-association studies; effect sizes are small and inconsistent.
      GG:
        effect: stronger_associated_signal
        description: Exploratory association signal only; should not be overinterpreted.
    aliases:
      GC: CG

  - rsid: rs2710102
    gene: CNTNAP2
    trait: Language and connectivity association signal
    evidence_level: low
    sources:
      - type: pubmed
        id: "21310003"
      - type: pubmed
        id: "30681286"
    genotypes:
      CC:
        effect: typical
        description: Typical genotype for this exploratory CNTNAP2 marker.
      CT:
        effect: associated_signal
        description: Common variant with a modest, inconsistent association to language or neurodevelopmental traits.
      TT:
        effect: stronger_associated_signal
        description: Exploratory association signal only, not a direct marker of autism.
    aliases:
      TC: CT

  - rsid: rs7794745
    gene: CNTNAP2
    trait: Social-communication association signal
    evidence_level: low
    sources:
      - type: pubmed
        id: "26559825"
      - type: pubmed
        id: "34257739"
    genotypes:
      TT:
        effect: typical
        description: Typical genotype for this exploratory CNTNAP2 marker.
      AT:
        effect: associated_signal
        description: Common variant associated in some studies with subtle shifts in language or social-communication traits.
      AA:
        effect: stronger_associated_signal
        description: Exploratory association signal only; should be read with substantial caution.
    aliases:
      TA: AT
