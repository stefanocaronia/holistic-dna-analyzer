name: "Pharmacogenomics: Selected Core Markers"
description: Conservative pharmacogenomics panel focused on a small set of better-supported medication and caffeine response markers
category: health
status: core
review_status: verified
version: 1
last_reviewed: 2026-03-26
summary: >
  Curated pharmacogenomics panel limited to a few comparatively strong, commonly used
  associations affecting clopidogrel activation, caffeine handling, and opioid response.
  It avoids over-interpreting behavioral dopamine SNPs as drug-response markers.
sources:
  - type: pubmed
    citation: "CYP2C19 genotype and ischemic outcomes during oral P2Y12 inhibitor therapy"
    url: "https://pubmed.ncbi.nlm.nih.gov/33744207/"
  - type: pubmed
    citation: "OPRM1 A118G effects on epidural fentanyl analgesia meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/23909491/"
  - type: pubmed
    citation: "CYP1A2 rs762551, coffee intake, and kidney dysfunction"
    url: "https://pubmed.ncbi.nlm.nih.gov/36701157/"
limitations:
  - Single SNPs do not reconstruct full star-allele diplotypes or full pharmacogenomic phenotypes.
  - Medication choice and dosing require clinician review and should not be based on this panel alone.
  - This core panel intentionally excludes weaker or more behavior-oriented claims.

variants:
  - rsid: rs4244285
    gene: CYP2C19
    trait: CYP2C19*2 reduced-function allele
    evidence_level: high
    sources:
      - type: pubmed
        citation: "CYP2C19 genotype and ischemic outcomes during oral P2Y12 inhibitor therapy"
        url: "https://pubmed.ncbi.nlm.nih.gov/33744207/"
    genotypes:
      GG:
        effect: no_star2
        description: No rs4244285 reduced-function allele at this locus. This lowers the chance of CYP2C19*2-related reduced activation of clopidogrel, but does not establish a full CYP2C19 phenotype.
      GA:
        effect: star2_carrier
        description: Carrier of one CYP2C19*2-associated reduced-function allele. This can contribute to lower clopidogrel activation and may matter clinically when combined with other CYP2C19 variants.
      AA:
        effect: star2_homozygous
        description: Homozygous for the CYP2C19*2-associated reduced-function allele. Stronger chance of reduced clopidogrel activation, though full phenotype still depends on the rest of the CYP2C19 genotype.
    aliases:
      AG: GA

  - rsid: rs762551
    gene: CYP1A2
    trait: Caffeine metabolism
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "CYP1A2 rs762551, coffee intake, and kidney dysfunction"
        url: "https://pubmed.ncbi.nlm.nih.gov/36701157/"
    genotypes:
      AA:
        effect: faster_caffeine_clearance
        description: Faster caffeine clearance on average. Heavy coffee intake appears less problematic in many cohorts than it does for slower metabolizers.
      AC:
        effect: slower_caffeine_clearance
        description: Slower caffeine clearance on average. Large coffee intake is more likely to cause jitteriness or be associated with adverse cardiometabolic findings than in AA carriers.
      CC:
        effect: slower_caffeine_clearance
        description: Slower caffeine clearance on average. If caffeine causes palpitations, insomnia, or blood pressure spikes, this genotype makes that more plausible.
    aliases:
      CA: AC

  - rsid: rs1799971
    gene: OPRM1
    trait: Opioid receptor sensitivity
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "OPRM1 A118G effects on epidural fentanyl analgesia meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/23909491/"
    genotypes:
      AA:
        effect: typical
        description: Typical OPRM1 profile at this locus. No A118G-related alteration in mu-opioid receptor binding is expected.
      AG:
        effect: altered
        description: One A118G allele. Associated with altered opioid response in some settings, but direction and clinical impact are not fully consistent across drugs and studies.
      GG:
        effect: significantly_altered
        description: Two A118G alleles. Stronger evidence of altered opioid response, but clinical interpretation still requires medication-specific context and professional review.
    aliases:
      GA: AG
