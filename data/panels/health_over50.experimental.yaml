name: "Health After 50"
description: Exploratory age-related screening panel with a few stronger prostate, PSA, and detoxification markers
category: health
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
review_outcome: experimental_only
review_notes: >
  Kept exploratory because it mixes useful screening prompts with context-heavy interpretation that should not be
  promoted to a trusted default panel.
summary: >
  Exploratory panel for age-related screening themes. It now focuses on a smaller subset
  of loci with more defensible links to prostate-cancer susceptibility, PSA baseline
  interpretation, and one detoxification-related cancer-susceptibility marker. It is not
  a substitute for standard screening or family-history-based clinical decisions.
sources:
  - type: pubmed
    citation: "8q24 research synopsis and meta-analysis across cancers"
    url: "https://pubmed.ncbi.nlm.nih.gov/32590746/"
  - type: pubmed
    citation: "8q24 polymorphisms and prostate cancer systematic review / meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/29158792/"
  - type: pubmed
    citation: "KLK3 rs2735839 and aggressive prostate cancer"
    url: "https://pubmed.ncbi.nlm.nih.gov/25274378/"
  - type: pubmed
    citation: "NQO1 rs1800566 and cancer susceptibility meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/36338728/"
limitations:
  - This panel is exploratory and should not drive cancer screening decisions by itself.
  - Several age-related traits originally included here were removed because evidence was weaker, too context-dependent, or already handled better elsewhere.
  - Most retained signals are most useful when combined with age, sex, family history, PSA/lipid labs, and routine medical care.

variants:
  - rsid: rs1800566
    gene: NQO1
    trait: Quinone detoxification / cancer susceptibility marker
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "NQO1 rs1800566 and cancer susceptibility meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/36338728/"
    genotypes:
      CC:
        effect: typical
        description: Typical NQO1 activity at this locus.
      CT:
        effect: reduced
        description: Reduced NQO1 activity. This may modestly alter carcinogen handling, but any cancer-risk interpretation remains broad and context-dependent.
      TT:
        effect: markedly_reduced
        description: Markedly reduced NQO1 activity at this locus. Environmental exposure and smoking history matter far more clinically than genotype alone.
    aliases:
      GG: CC
      AG: CT
      AA: TT

  - rsid: rs1447295
    gene: 8q24 region
    trait: Prostate cancer susceptibility locus 1
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "8q24 polymorphisms and prostate cancer systematic review / meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/29158792/"
    genotypes:
      CC:
        effect: lower_risk
        description: Lower known prostate-cancer susceptibility at this locus.
      CA:
        effect: moderate_risk
        description: One risk allele. Associated with moderately increased prostate-cancer susceptibility in meta-analyses.
      AA:
        effect: higher_risk
        description: Two risk alleles. Associated with higher prostate-cancer susceptibility, but still far from deterministic.
    aliases:
      AC: CA
    note: Most relevant for males

  - rsid: rs16901979
    gene: 8q24 region
    trait: Prostate cancer susceptibility locus 2
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "8q24 research synopsis and meta-analysis across cancers"
        url: "https://pubmed.ncbi.nlm.nih.gov/32590746/"
    genotypes:
      CC:
        effect: lower_risk
        description: Lower known prostate-cancer susceptibility at this locus.
      CA:
        effect: moderate_risk
        description: One risk allele. Adds modest prostate-cancer susceptibility in several datasets.
      AA:
        effect: higher_risk
        description: Two risk alleles. Stronger signal at this locus, though family history and age remain more informative than genotype alone.
    aliases:
      AC: CA
    note: Most relevant for males

  - rsid: rs2735839
    gene: KLK3 (PSA)
    trait: Baseline PSA tendency
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "KLK3 rs2735839 and aggressive prostate cancer"
        url: "https://pubmed.ncbi.nlm.nih.gov/25274378/"
    genotypes:
      GG:
        effect: typical
        description: Typical PSA baseline tendency at this locus.
      GA:
        effect: lower_psa
        description: Lower PSA tendency. This matters mostly for interpreting PSA values in context, not as a direct cancer-risk result.
      AA:
        effect: markedly_lower_psa
        description: More strongly lower PSA tendency. Screening interpretation may need more nuance because a 'normal' PSA could be relatively less reassuring.
    aliases:
      AG: GA
    note: Most relevant for males
