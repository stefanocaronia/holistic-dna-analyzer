name: "Wellness & Fitness"
description: Focused exploratory panel for exercise-response tendencies and muscle-performance orientation
category: wellness
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
summary: >
  Exploratory wellness panel narrowed to a small number of exercise-related variants with
  clearer literature support than most generic wellness claims. It is useful for framing
  broad training tendencies, not for prescribing a sport or predicting performance on its own.
sources:
  - type: pubmed
    citation: "Physical activity attenuates the influence of FTO variants on obesity risk meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/22069379/"
  - type: pubmed
    citation: "ACTN3 R577X and elite power sports meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/31145768/"
limitations:
  - Exercise adaptation is strongly shaped by training history, body composition, sleep, injury history, and motivation, not genotype alone.
  - This panel describes broad tendencies, not hard limits or personalized training prescriptions.
  - Several previous wellness SNPs were removed because they were better handled in other panels or too weakly supported for this repository panel.

variants:
  - rsid: rs9939609
    gene: FTO
    trait: Physical activity modifies obesity susceptibility
    evidence_level: high
    sources:
      - type: pubmed
        citation: "Physical activity attenuates the influence of FTO variants on obesity risk meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/22069379/"
      - type: pubmed
        citation: "Physical activity attenuates the effect of the FTO genotype on obesity traits"
        url: "https://pubmed.ncbi.nlm.nih.gov/26921105/"
    genotypes:
      TT:
        effect: typical
        description: Typical obesity susceptibility at this locus. Physical activity remains beneficial, but there is no added FTO-specific obesity signal to offset here.
      TA:
        effect: activity_sensitive
        description: One FTO risk allele. Physical activity appears especially relevant because it can attenuate part of the obesity signal associated with this locus.
      AA:
        effect: strongly_activity_sensitive
        description: Two FTO risk alleles. This does not make weight gain inevitable, but it strengthens the case that sustained physical activity matters more than average for offsetting this locus.
    aliases:
      AT: TA

  - rsid: rs1815739
    gene: ACTN3
    trait: Power-versus-endurance muscle tendency
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "ACTN3 R577X and elite power sports meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/31145768/"
      - type: pubmed
        citation: "ACTN3 genotype, athletic status, and life-course physical capability meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/21542061/"
    genotypes:
      CC:
        effect: power_tendency
        description: More power/sprint-oriented muscle profile at this locus. This is a tendency, not a fixed athletic identity.
      CT:
        effect: mixed_profile
        description: Mixed profile with no strong push toward either extreme. Many people with this genotype do well across different training styles.
      TT:
        effect: endurance_tendency
        description: More endurance-leaning profile at this locus, with less alpha-actinin-3 in fast fibers. This can favor endurance traits, but training still dominates the real outcome.
