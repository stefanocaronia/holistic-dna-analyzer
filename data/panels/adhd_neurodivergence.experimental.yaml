name: Attention Regulation & ADHD Signals
description: Exploratory common-variant panel for attention regulation and medication-relevant ADHD signals
category: health
status: experimental
review_status: exploratory
version: 1
last_reviewed: 2026-03-26
review_outcome: experimental_only
review_notes: >
  Kept exploratory under stricter standards because attention-regulation and treatment-response signals are easy to
  over-interpret clinically.
summary: >
  Narrow exploratory panel centered on two common variants with some relevance to
  attention regulation and ADHD medication response. These are small probabilistic
  signals and should not be treated as diagnostic markers for ADHD or
  neurodivergence.
sources:
  - type: pubmed
    id: "25915480"
  - type: pubmed
    id: "36325160"
  - type: pubmed
    id: "20864182"
limitations:
  - Common variants explain only a small fraction of ADHD risk and do not diagnose ADHD.
  - Clinical presentation depends much more on behavior, development, environment, and impairment than on these SNPs.
  - This panel is best used as contextual support alongside sleep, stress, and nutrition findings.

variants:
  - rsid: rs27072
    gene: SLC6A3 (DAT1)
    trait: Dopamine transporter / attention-regulation signal
    evidence_level: low
    sources:
      - type: pubmed
        id: "25915480"
    genotypes:
      CC:
        effect: typical
        description: Typical common-variant DAT1 signal in this panel.
      CT:
        effect: altered_signal
        description: Exploratory signal that may modestly shift dopamine transporter-related attention traits.
      TT:
        effect: stronger_altered_signal
        description: Exploratory signal with a somewhat stronger DAT1-related association in ADHD studies.
    aliases:
      TC: CT

  - rsid: rs1800544
    gene: ADRA2A
    trait: Noradrenergic medication-response tendency
    evidence_level: medium
    sources:
      - type: pubmed
        id: "36325160"
      - type: pubmed
        id: "20864182"
    genotypes:
      CC:
        effect: typical
        description: Typical common-variant signal for this medication-response marker.
      CG:
        effect: treatment_relevant
        description: Variant associated in some studies with differences in response to noradrenergic or stimulant treatment.
      GG:
        effect: treatment_relevant
        description: Variant associated in some studies with treatment-response differences, but not sufficient for clinical decision-making on its own.
    aliases:
      GC: CG
