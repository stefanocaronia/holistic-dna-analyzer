name: Physical Traits
description: Conservative physical-trait panel limited to a few strongly associated visible characteristics
category: traits
status: core
review_status: verified
version: 1
last_reviewed: 2026-03-26
summary: >
  Curated physical-trait panel focused on a small set of highly recognizable genotype-phenotype
  associations for eye colour, red-hair tendency, and earwax/body-odour type.
sources:
  - type: pubmed
    citation: "HERC2 rs12913832 as a major eye-colour predictor"
    url: "https://pubmed.ncbi.nlm.nih.gov/36980970/"
  - type: pubmed
    citation: "rs1805007 and related pigmentation SNPs in human hair-colour prediction"
    url: "https://pubmed.ncbi.nlm.nih.gov/28242083/"
  - type: pubmed
    citation: "ABCC11 rs17822931 determines earwax type and body odour tendency"
    url: "https://pubmed.ncbi.nlm.nih.gov/23325016/"
limitations:
  - These are tendencies, not perfect phenotype predictions.
  - Visible traits remain influenced by ancestry and additional loci not represented here.
  - This core panel excludes behavioral or mood-related SNP claims.

variants:
  - rsid: rs12913832
    gene: HERC2/OCA2
    trait: Eye color
    evidence_level: high
    sources:
      - type: pubmed
        citation: "HERC2 rs12913832 as a major eye-colour predictor"
        url: "https://pubmed.ncbi.nlm.nih.gov/36980970/"
    genotypes:
      GG:
        effect: blue_eyes
        description: Likely blue or light-colored eyes. Strong predictor (~72% accuracy for blue).
      AG:
        effect: mixed
        description: Likely green, hazel, or blue-brown mix. Intermediate pigmentation.
      AA:
        effect: brown_eyes
        description: Likely brown eyes. Standard melanin production.

  - rsid: rs1805007
    gene: MC1R
    trait: Red hair and fair skin (R151C)
    evidence_level: high
    sources:
      - type: pubmed
        citation: "rs1805007 and related pigmentation SNPs in human hair-colour prediction"
        url: "https://pubmed.ncbi.nlm.nih.gov/28242083/"
    genotypes:
      CC:
        effect: normal
        description: Normal pigmentation. No MC1R R151C variant.
      CT:
        effect: carrier
        description: Carrier of one red hair allele. May have lighter skin or freckling.
      TT:
        effect: red_hair
        description: Homozygous MC1R variant. Red hair likely, very fair skin, high sun sensitivity.

  - rsid: rs17822931
    gene: ABCC11
    trait: Earwax type and body odor
    evidence_level: high
    sources:
      - type: pubmed
        citation: "ABCC11 rs17822931 determines earwax type and body odour tendency"
        url: "https://pubmed.ncbi.nlm.nih.gov/23325016/"
    genotypes:
      CC:
        effect: wet
        description: Wet earwax type. Standard apocrine gland activity (more body odor).
      CT:
        effect: wet
        description: Wet earwax type (dominant). Standard body odor.
      TT:
        effect: dry
        description: Dry earwax. Reduced body odor. Common in East Asian populations.
