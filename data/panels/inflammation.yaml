name: Inflammation & Immune Susceptibility
description: Conservative inflammation panel focused on a few more defensible immune-regulation associations
category: health
status: core
review_status: verified
version: 1
last_reviewed: 2026-03-26
review_outcome: approved_for_core
review_notes: >
  Reviewed for repository inclusion with scope limited to stronger immune and gut-inflammation loci that remain
  useful without overstating causal claims.
summary: >
  Curated inflammation panel narrowed to a small set of immune-regulation variants with
  comparatively stronger support than many popular cytokine SNP claims. It focuses on
  autoimmune susceptibility and inflammatory bowel disease tendency, not on diagnosis or
  direct prediction of cytokine lab values.
sources:
  - type: pmc
    citation: "Meta-analysis of rheumatoid arthritis-related SNPs highlighting PTPN22 rs2476601"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3519690/"
  - type: pubmed
    citation: "IL-10 rs3024505 and inflammatory bowel disease susceptibility meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/34628128/"
  - type: pubmed
    citation: "IL-10 promoter polymorphisms and inflammatory bowel disease meta-analysis"
    url: "https://pubmed.ncbi.nlm.nih.gov/24128120/"
limitations:
  - Associations are probabilistic and not diagnostic.
  - Autoimmune and inflammatory disease risk is strongly modified by ancestry, environment, smoking, infections, and other loci.
  - Several widely cited cytokine SNPs were intentionally excluded from the core set because direction or effect size is too context-dependent for a trusted default panel.

variants:
  - rsid: rs3024505
    gene: IL10 region
    trait: Inflammatory bowel disease susceptibility
    evidence_level: high
    sources:
      - type: pubmed
        citation: "IL-10 rs3024505 and inflammatory bowel disease susceptibility meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/34628128/"
    genotypes:
      CC:
        effect: normal
        description: Lower known risk at this locus for inflammatory bowel disease.
      CT:
        effect: moderate_risk
        description: One risk allele. Associated with modestly higher inflammatory bowel disease susceptibility in meta-analysis.
      TT:
        effect: higher_risk
        description: Two risk alleles. Associated with higher inflammatory bowel disease susceptibility, especially when other risk factors are present.
    aliases:
      GG: CC
      AG: CT
      AA: TT

  - rsid: rs2476601
    gene: PTPN22
    trait: Autoimmune susceptibility — master switch
    evidence_level: high
    sources:
      - type: pmc
        citation: "Meta-analysis of rheumatoid arthritis-related SNPs highlighting PTPN22 rs2476601"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3519690/"
    genotypes:
      GG:
        effect: normal
        description: Typical PTPN22-related immune regulation at this locus.
      GA:
        effect: increased_risk
        description: One risk allele. Associated with higher autoimmune susceptibility across several conditions, especially rheumatoid arthritis and some thyroid or type 1 diabetes contexts.
      AA:
        effect: higher_risk
        description: Two risk alleles. Associated with clearly higher autoimmune susceptibility, though absolute risk still depends heavily on family history and environment.

  - rsid: rs1800871
    gene: IL10
    trait: Ulcerative colitis susceptibility
    evidence_level: medium
    sources:
      - type: pubmed
        citation: "IL-10 promoter polymorphisms and inflammatory bowel disease meta-analysis"
        url: "https://pubmed.ncbi.nlm.nih.gov/24128120/"
    genotypes:
      CC:
        effect: lower_risk
        description: Lower known ulcerative colitis susceptibility at this locus.
      TC:
        effect: moderate_risk
        description: One risk allele. Associated with modestly higher ulcerative colitis susceptibility in some meta-analytic datasets.
      TT:
        effect: higher_risk
        description: Two risk alleles. Associated with higher ulcerative colitis susceptibility, though effect size remains modest.
    aliases:
      AA: TT
      AG: TC
      GG: CC
