name: Nutrigenomics
description: Genetic variants affecting nutrition, food intolerances, and metabolism
category: nutrition

variants:
  - rsid: rs4988235
    gene: MCM6/LCT
    trait: Lactose tolerance
    genotypes:
      GG:
        effect: lactose_intolerant
        description: Lactose intolerant (European-type). Lactase production declines after childhood.
      GA:
        effect: lactose_tolerant
        description: Lactose tolerant. One persistence allele maintains lactase production.
      AA:
        effect: lactose_tolerant
        description: Lactose tolerant. Full lactase persistence into adulthood.
    aliases:
      CT: GA
      CC: AA
      TT: GG

  - rsid: rs1801282
    gene: PPARG
    trait: Fat metabolism — PPARG Pro12Ala
    genotypes:
      CC:
        effect: normal
        description: Standard fat storage and insulin sensitivity.
      CG:
        effect: protective
        description: Ala variant carrier. Improved insulin sensitivity, lower type 2 diabetes risk.
      GG:
        effect: protective
        description: Homozygous Ala. Strongest protective effect against insulin resistance.

  - rsid: rs9939609
    gene: FTO
    trait: Obesity risk (FTO gene)
    genotypes:
      TT:
        effect: lower_risk
        description: Lower genetic predisposition to obesity. Normal appetite signaling.
      TA:
        effect: moderate_risk
        description: One risk allele. ~1.3x increased obesity risk. Responds well to exercise.
      AA:
        effect: higher_risk
        description: Two risk alleles. ~1.7x increased obesity risk. Exercise particularly beneficial.
    aliases:
      AT: TA

  - rsid: rs1800562
    gene: HFE
    trait: Hereditary hemochromatosis (C282Y)
    genotypes:
      GG:
        effect: normal
        description: Normal iron metabolism.
      GA:
        effect: carrier
        description: Carrier of C282Y. Usually no symptoms, but monitor iron levels.
      AA:
        effect: at_risk
        description: Homozygous C282Y. High risk of iron overload. Regular ferritin monitoring recommended.

  - rsid: rs1695
    gene: GSTP1
    trait: Glutathione S-transferase — detoxification
    genotypes:
      AA:
        effect: normal
        description: Normal detoxification enzyme activity.
      AG:
        effect: reduced
        description: Reduced GSTP1 activity. May benefit from cruciferous vegetables (broccoli, kale).
      GG:
        effect: significantly_reduced
        description: Significantly reduced detoxification. Increase antioxidant-rich foods.

  - rsid: rs7903146
    gene: TCF7L2
    trait: Type 2 diabetes risk
    genotypes:
      CC:
        effect: lower_risk
        description: Lower genetic risk for type 2 diabetes.
      CT:
        effect: moderate_risk
        description: One risk allele. ~1.4x increased diabetes risk. Low-glycemic diet beneficial.
      TT:
        effect: higher_risk
        description: Two risk alleles. ~2x increased diabetes risk. Strong dietary management recommended.
