name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke test
        run: |
          python -m hda.cli panels
          python -m hda.cli panel-audit
          python -m hda.cli context --help
          python -m hda.cli export --help

      - name: Agent API smoke test
        run: python -c "from hda.tools import available_panels, migrate_context; print(len(available_panels())); print(callable(migrate_context))"

      - name: Guard against tracked sensitive data
        shell: bash
        run: |
          set -euo pipefail
          blocked="$(git ls-files \
            'config.yaml' \
            'data/db/**' \
            'data/context/**' \
            'output/**' \
            'tmp/**' \
            'data/sources/**' \
            ':(exclude)data/db/.gitkeep' \
            ':(exclude)data/context/.gitkeep' \
            ':(exclude)data/sources/dna-example.csv')"
          if [ -n "$blocked" ]; then
            echo "Tracked sensitive or generated files detected:"
            echo "$blocked"
            exit 1
          fi
